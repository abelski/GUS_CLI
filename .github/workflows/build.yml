name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: gus-macos
            binary: dist/gus
          - os: ubuntu-latest
            artifact: gus-linux
            binary: dist/gus
          - os: windows-latest
            artifact: gus-windows
            binary: dist/gus.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller gus.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mkdir -p release
          mv artifacts/gus-macos/gus       release/gus-macos
          mv artifacts/gus-linux/gus       release/gus-linux
          mv artifacts/gus-windows/gus.exe release/gus-windows.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/gus-macos
            release/gus-linux
            release/gus-windows.exe
